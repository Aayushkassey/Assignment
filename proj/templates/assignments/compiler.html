<!doctype html>
<html lang="en">
<head>
    <title>Compiler | {{ lab.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .split-container { display: flex; height: 90vh; overflow: hidden; }
        .instructions { width: 30%; padding: 20px; overflow-y: auto; border-right: 2px solid #ddd; }
        .compiler-area { width: 70%; position: relative; background: #1e1e1e; }
        iframe { width: 100%; height: 100%; border: none; }
        #no-paste-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">{{ lab.title }} - Mode: Manual Typing</span>
    <a href="{% url 'dashboard' %}" class="btn btn-outline-light btn-sm">Exit</a>
</nav>

<div class="split-container">
    <div class="instructions">
        <h4>Task Instructions</h4>
        <hr>
        <p>{{ lab.description|linebreaks }}</p>
        
        <form method="post" id="submission-form" class="mt-5">
            {% csrf_token %}
            <label class="fw-bold">Final Code for Submission:</label>
            <textarea name="typed_code" id="code-entry" class="form-control mb-3" rows="10" placeholder="Type your final code here to submit..."></textarea>
            
            <button type="submit" class="btn btn-success w-100">Submit Assignment</button>
        </form>
    </div>

    <div class="compiler-area" id="compiler-zone">
        <div id="no-paste-overlay"></div> 
        <iframe src="https://pyblaze.com/embed/python" id="py-frame"></iframe>
    </div>
</div>

<script>
    const zone = document.getElementById('compiler-zone');
    const entry = document.getElementById('code-entry');

    // Block Paste on the entire right side
    zone.addEventListener('paste', (e) => {
        e.preventDefault();
        alert("Copy-paste is strictly disabled for this lab!");
    });

    // Block Paste on the submission text area too
    entry.addEventListener('paste', (e) => {
        e.preventDefault();
        alert("You must type your submission manually.");
    });

    // Block Right Click
    document.addEventListener('contextmenu', event => event.preventDefault());
</script>

</body>
</html>
