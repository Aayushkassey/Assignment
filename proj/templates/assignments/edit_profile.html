<!doctype html>
<html lang="en">
<head>
    <title>Edit Profile | LabPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .edit-card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .form-label { font-weight: 600; color: #495057; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card edit-card p-4 p-lg-5">
                <div class="text-center mb-4">
                    <h3 class="fw-bold">Update Profile</h3>
                    <p class="text-muted">Modify your personal and academic details</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary py-2 fw-bold">
                            <i class="fas fa-save me-2"></i>Save Changes
                        </button>
                        <a href="{% url 'profile_view' %}" class="btn btn-light py-2 text-secondary">Cancel</a>
                    </div>
                </form>
            </div>
            
            <p class="text-center mt-3 text-muted small">
                Note: Your <strong>Username</strong> and <strong>Role</strong> cannot be changed.
            </p>
        </div>
    </div>
</div>

</body>
</html>
