<!doctype html>
<html lang="en">
<head>
    <title>Create New Lab | LabPortal</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .form-card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn-submit { border-radius: 8px; padding: 12px; font-weight: 600; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <a href="{% url 'dashboard' %}" class="btn btn-link text-decoration-none mb-3">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>

            <div class="card form-card p-4">
                <h3 class="mb-4 text-center"><i class="fas fa-flask text-primary me-2"></i>Post New Lab Work</h3>
                
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Lab Title</label>
                        <input type="text" name="title" class="form-control" placeholder="e.g. Java Basics: Loops" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Semester</label>
                        <select name="semester" class="form-select" required>
                            <option value="" selected disabled>Select Semester</option>
                            <option value="1">Semester 1</option>
                            <option value="2">Semester 2</option>
                            <option value="3">Semester 3</option>
                            <option value="4">Semester 4</option>
                            <option value="5">Semester 5</option>
                            <option value="6">Semester 6</option>
                            <option value="7">Semester 7</option>
                            <option value="8">Semester 8</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Instructions / Problem Statement</label>
                        <textarea name="description" class="form-control" rows="5" placeholder="Write the lab tasks here..." required></textarea>
                        <small class="text-muted">Explain what the student needs to type in the compiler.</small>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Submission Deadline</label>
                        <input type="datetime-local" name="deadline" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 btn-submit shadow-sm">
                        <i class="fas fa-paper-plane me-2"></i> Publish Lab Work
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>
</body>
</html>
