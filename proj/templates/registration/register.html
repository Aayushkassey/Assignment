<!doctype html>
<html lang="en">
<head>
    <title>Register | Assignment App</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; min-height: 100vh; display: flex; align-items: center; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; }
        .btn-primary { border-radius: 8px; padding: 10px; font-weight: 600; }
        /* Forces Django form fields to look like Bootstrap */
        .mb-3 input, .mb-3 select { 
            display: block;
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid #ced4da;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card p-4 my-5">
                    <h3 class="text-center mb-4">Create Account</h3>
                    <form method="post">
                        {% csrf_token %}
                        
                        {% for field in form %}
                            <div class="mb-3" id="div_{{ field.name }}">
                                <label class="form-label fw-bold">{{ field.label }}</label>
                                {{ field }}
                                {% if field.help_text %}
                                    <small class="text-muted d-block" style="font-size: 0.75rem;">{{ field.help_text }}</small>
                                {% endif %}
                                {% for error in field.errors %}
                                    <div class="text-danger small">{{ error }}</div>
                                {% endfor %}
                            </div>
                        {% endfor %}

                        <button type="submit" class="btn btn-primary w-100 shadow-sm mt-3">Register</button>
                    </form>
                    <div class="mt-3 text-center">
                        <small>Already have an account? <a href="{% url 'login' %}" class="text-decoration-none">Login here</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Style all inputs automatically
        document.querySelectorAll('input, select').forEach(el => el.classList.add('form-control'));

        const roleField = document.querySelector('select[name="role"]');
        const semesterDiv = document.getElementById('div_semester');

        function toggleSemester() {
            if (roleField && semesterDiv) {
                semesterDiv.style.display = (roleField.value === 'teacher') ? 'none' : 'block';
            }
        }

        if (roleField) {
            roleField.addEventListener('change', toggleSemester);
            toggleSemester(); 
        }
    </script>
</body>
</html>
